<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPILLA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: Helvetica, Arial, sans-serif; }
canvas { display: block; width: 100%; height: 100%; }
#back {
  position: fixed; top: 10px; left: 10px; z-index: 10;
  color: #fff; font-size: 48px; font-family: serif;
  text-decoration: none; line-height: 1;
}
#back:hover { opacity: 0.6; }
#controls {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  padding: 8px 16px; border-radius: 8px; display: flex; gap: 14px;
  flex-wrap: wrap; justify-content: center; align-items: center;
  font-size: 11px; color: #ccc; z-index: 10; user-select: none;
}
#controls label { display: flex; align-items: center; gap: 4px; }
#controls input[type="range"] { width: 50px; vertical-align: middle; }
#controls input[type="color"] { width: 22px; height: 22px; border: none; padding: 0; cursor: pointer; vertical-align: middle; }
#controls span { min-width: 16px; text-align: center; display: inline-block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="../index.html">←</a>
<div id="controls">
  <label>Thread <input type="color" id="threadColor" value="#d4a017"></label>
  <label>Letters <input type="color" id="letterColor" value="#888888"></label>
  <label>Width <input type="range" id="threadWidth" min="0.5" max="6" step="0.1" value="2.5"><span id="twVal">2.5</span></label>
  <label>Size <input type="range" id="letterSize" min="10" max="80" step="1" value="42"><span id="lsVal">42</span></label>
  <label>Stagger <input type="range" id="stagger" min="0" max="0.5" step="0.005" value="0.08"><span id="stVal">0.08</span></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const LETTERS = ['S', 'P', 'I', 'L', 'L', 'A'];
const NUM_STITCHES = 14;

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initZigzag(); });

const inputs = {
  threadColor: document.getElementById('threadColor'),
  letterColor: document.getElementById('letterColor'),
  threadWidth: document.getElementById('threadWidth'),
  letterSize: document.getElementById('letterSize'),
  stagger: document.getElementById('stagger'),
};

const twVal = document.getElementById('twVal');
const lsVal = document.getElementById('lsVal');
const stVal = document.getElementById('stVal');

inputs.threadWidth.addEventListener('input', () => { twVal.textContent = inputs.threadWidth.value; });
inputs.letterSize.addEventListener('input', () => { lsVal.textContent = inputs.letterSize.value; });
inputs.stagger.addEventListener('input', () => { stVal.textContent = inputs.stagger.value; });

function getCfg() {
  return {
    tCol: inputs.threadColor.value || '#d4a017',
    lCol: inputs.letterColor.value || '#888888',
    tW: parseFloat(inputs.threadWidth.value) || 2.5,
    lSz: parseFloat(inputs.letterSize.value) || 42,
    stg: parseFloat(inputs.stagger.value) || 0.08,
  };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function drawBackground(ctx_, W_, H_) {
  ctx_.fillStyle = '#fff';
  ctx_.fillRect(0, 0, W_, H_);
}

function drawFabric(ctx_, W_, H_) {
  const cy = H_ / 2;
  const fw = W_ * 0.75;
  const fh = H_ * 0.80;
  const l = W_ / 2 - fw / 2;
  const r = l + fw;
  const t = cy - fh/2;
  const b = cy + fh/2;

  const cloth = new Path2D();
  cloth.moveTo(l, t);
  for (let x = l; x <= r; x += 1) {
    cloth.lineTo(x, t + Math.sin((x - l) * 0.03) * 6);
  }
  for (let y = t; y <= b; y += 1) {
    cloth.lineTo(r + Math.sin((y - t) * 0.025) * 4, y);
  }
  for (let x = r; x >= l; x -= 1) {
    cloth.lineTo(x, b + Math.sin((x - l) * 0.035 + 2) * 5);
  }
  for (let y = b; y >= t; y -= 1) {
    cloth.lineTo(l + Math.sin((y - t) * 0.02 + 1) * 3, y);
  }
  cloth.closePath();

  ctx_.shadowColor = 'rgba(0,0,0,0.12)';
  ctx_.shadowBlur = 30;
  ctx_.shadowOffsetY = 6;
  ctx_.fillStyle = '#2a3a5c';
  ctx_.fill(cloth);
  ctx_.shadowColor = 'transparent';
  ctx_.shadowBlur = 0;
  ctx_.shadowOffsetY = 0;
}

let zigCx, zigTopY, zigH, zigW;

function initZigzag() {
  zigCx = W / 2;
  zigTopY = H / 2 - H * 0.80 / 2;
  zigH = H * 0.80;
  zigW = W * 0.18;
}

function getZigzagPoint(t) {
  const totalSegs = NUM_STITCHES * 2;
  const rawIdx = t * totalSegs;
  const idx = Math.floor(rawIdx);
  const localT = rawIdx - idx;

  const p1 = zigzagVertex(idx);
  const p2 = zigzagVertex(Math.min(idx + 1, totalSegs));
  return {
    x: lerp(p1.x, p2.x, localT),
    y: lerp(p1.y, p2.y, localT),
  };
}

function zigzagVertex(idx) {
  if (idx % 2 === 0) {
    const sn = idx / 2;
    return { x: zigCx, y: zigTopY + (sn / NUM_STITCHES) * zigH };
  } else {
    const sn = Math.floor(idx / 2);
    const isLeft = sn % 2 !== 0;
    return {
      x: zigCx + (isLeft ? -1 : 1) * zigW,
      y: zigTopY + ((sn + 0.5) / NUM_STITCHES) * zigH,
    };
  }
}

function getZigzagAngle(t) {
  const totalSegs = NUM_STITCHES * 2;
  const rawIdx = t * totalSegs;
  const idx = Math.min(Math.floor(rawIdx), totalSegs - 1);
  const p1 = zigzagVertex(idx);
  const p2 = zigzagVertex(Math.min(idx + 1, totalSegs));
  return Math.atan2(p2.y - p1.y, p2.x - p1.x);
}

function zigzagSide(t) {
  const totalSegs = NUM_STITCHES * 2;
  const rawIdx = t * totalSegs;
  const idx = Math.floor(rawIdx);
  if (idx >= totalSegs) return 'right';
  if (idx % 2 === 0) return 'fold';
  const sn = Math.floor(idx / 2);
  return sn % 2 === 0 ? 'right' : 'left';
}

function drawLetter(ctx_, char, x, y, size, color, angle, alpha, mode) {
  ctx_.save();
  ctx_.translate(x, y);
  ctx_.rotate(angle);
  ctx_.font = `bold ${size}px Helvetica, Arial, sans-serif`;
  ctx_.textAlign = 'center';
  ctx_.textBaseline = 'middle';
  if (mode === 'fold') {
    ctx_.globalAlpha = alpha * 0.2;
    ctx_.fillStyle = '#2a3a5c';
  } else if (mode === 'right') {
    ctx_.globalAlpha = alpha * 0.5;
    ctx_.fillStyle = '#3a4a6c';
  } else {
    ctx_.globalAlpha = alpha;
    ctx_.fillStyle = color;
    ctx_.shadowColor = 'rgba(0,0,0,0.15)';
    ctx_.shadowBlur = 3;
  }
  ctx_.fillText(char, 0, 0);
  ctx_.restore();
}

function drawStitches(ctx_, prog, color, width, alpha) {
  if (prog <= 0) return;
  ctx_.save();
  const totalSegs = NUM_STITCHES * 2;
  const segs = Math.floor(prog * totalSegs);
  for (let i = 0; i < segs; i++) {
    const p1 = zigzagVertex(i);
    const p2 = zigzagVertex(i + 1);
    ctx_.globalAlpha = alpha;
    ctx_.strokeStyle = color;
    ctx_.lineWidth = width;
    ctx_.lineCap = 'round';
    ctx_.shadowColor = color;
    ctx_.shadowBlur = 2;
    ctx_.beginPath();
    ctx_.moveTo(p1.x, p1.y);
    ctx_.lineTo(p2.x, p2.y);
    ctx_.stroke();
  }
  ctx_.shadowBlur = 0;
  for (let i = 0; i < NUM_STITCHES + 1; i++) {
    const t = (i + 0.001) / (NUM_STITCHES * 2);
    if (t > prog) break;
    const pt = zigzagVertex(i * 2);
    ctx_.globalAlpha = alpha * 0.7;
    ctx_.fillStyle = 'rgba(30,20,10,0.6)';
    ctx_.beginPath();
    ctx_.arc(pt.x, pt.y, width * 0.3, 0, Math.PI * 2);
    ctx_.fill();
    ctx_.beginPath();
    ctx_.arc(pt.x, pt.y, width * 0.15, 0, Math.PI * 2);
    ctx_.fillStyle = 'rgba(10,5,0,0.8)';
    ctx_.fill();
  }
  ctx_.restore();
}

function drawSafetyPin(ctx_, pt, alpha) {
  const a = Math.PI * 0.75;
  const len = 14;
  const px = pt.x + Math.cos(a) * len;
  const py = pt.y + Math.sin(a) * len;
  ctx_.save();
  ctx_.globalAlpha = alpha;
  ctx_.shadowColor = 'rgba(0,0,0,0.12)';
  ctx_.shadowBlur = 2;
  ctx_.strokeStyle = '#a0a0a8';
  ctx_.lineWidth = 1.8;
  ctx_.beginPath();
  ctx_.moveTo(pt.x, pt.y);
  ctx_.lineTo(px, py);
  ctx_.stroke();
  ctx_.fillStyle = '#b8b8c0';
  ctx_.beginPath();
  ctx_.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
  ctx_.fill();
  ctx_.fillStyle = '#888890';
  ctx_.beginPath();
  ctx_.arc(px, py, 1, 0, Math.PI * 2);
  ctx_.fill();
  ctx_.restore();
}

let startTime = 0;

function draw(ts) {
  try {
  const cfg = getCfg();
  const stg = cfg.stg;
  const letterTravelTime = 20;
  const travelTime = stg * (LETTERS.length - 1) + letterTravelTime;
  const holdTime = 2.0;
  const fadeTime = 0.8;
  const cycleLen = travelTime + holdTime + fadeTime;
  const t = ((ts - startTime) / 1000);
  const ct = t % cycleLen;

  let alpha = 1;
  if (ct >= travelTime + holdTime) {
    alpha = 1 - (ct - travelTime - holdTime) / fadeTime;
  }
  alpha = Math.max(0, alpha);

  ctx.clearRect(0, 0, W, H);
  drawBackground(ctx, W, H);

  // Compute positions and sides for all letters
  const letterData = [];
  for (let i = 0; i < LETTERS.length; i++) {
    const raw = (ct - stg * i) / letterTravelTime;
    const prog = clamp(raw, 0, 1);
    const endPt = getZigzagPoint(1);
    const fx = W / 2 - 80 + (i - 2.5) * cfg.lSz * 0.6;
    const fy = H * 0.88;
    let drawX, drawY, mode;
    if (raw >= 1) {
      const sinceDone = raw - 1;
      if (sinceDone < 0.3) {
        const tr = sinceDone / 0.3;
        const ease = tr * tr * (3 - 2 * tr);
        drawX = lerp(endPt.x, fx, ease);
        drawY = lerp(endPt.y, fy, ease);
      } else {
        drawX = fx;
        drawY = fy;
      }
      mode = 'done';
    } else if (raw >= 0) {
      const pt = getZigzagPoint(prog);
      drawX = pt.x;
      drawY = pt.y;
      mode = zigzagSide(prog);
    } else {
      continue;
    }
    letterData.push({ i, raw, drawX, drawY, mode });
  }

  // Letters during zigzag that are LEFT of center — drawn UNDER fabric
  for (const d of letterData) {
    if (d.raw < 1 && d.drawX < W / 2) {
      drawLetter(ctx, LETTERS[d.i], d.drawX, d.drawY, cfg.lSz, cfg.lCol, 0, alpha, 'none');
    }
  }

  drawFabric(ctx, W, H);

  // Letters during zigzag that are RIGHT of center + all after zigzag — drawn ON TOP
  for (const d of letterData) {
    if (d.raw >= 1 || d.drawX >= W / 2) {
      drawLetter(ctx, LETTERS[d.i], d.drawX, d.drawY, cfg.lSz, cfg.lCol, 0, alpha, 'none');
    }
  }

  let minProg = 1, maxProg = 0;
  for (let i = 0; i < LETTERS.length; i++) {
    const raw = (ct - stg * i) / letterTravelTime;
    const prog = clamp(raw, 0, 1);
    if (prog > 0) {
      if (prog < minProg) minProg = prog;
      if (prog > maxProg) maxProg = prog;
    }
  }
  const stitchProg = Math.min(1, maxProg);

  // Draw thread segments completed by ALL letters
  if (stitchProg > 0 && alpha > 0) {
    ctx.save();
    const totalSegs = NUM_STITCHES * 2;
    const segs = Math.floor(minProg * totalSegs);
    for (let i = 0; i < segs; i++) {
      const p1 = zigzagVertex(i);
      const p2 = zigzagVertex(i + 1);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = cfg.tCol;
      ctx.lineWidth = cfg.tW;
      ctx.lineCap = 'round';
      ctx.shadowColor = cfg.tCol;
      ctx.shadowBlur = 2;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // For each visible letter, draw the trail right behind it
    for (let i = 0; i < LETTERS.length; i++) {
      const raw = (ct - stg * i) / letterTravelTime;
      const prog = clamp(raw, 0, 1);
      if (raw < 0 || raw >= 1) continue;
      const segIdx = Math.floor(prog * totalSegs);
      const segStart = zigzagVertex(segIdx);
      const letterPt = getZigzagPoint(prog);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = cfg.tCol;
      ctx.lineWidth = cfg.tW;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(segStart.x, segStart.y);
      ctx.lineTo(letterPt.x, letterPt.y);
      ctx.stroke();
    }
    ctx.restore();

    // Needle hole dots at completed segments
    ctx.save();
    ctx.shadowBlur = 0;
    for (let i = 0; i < NUM_STITCHES + 1; i++) {
      const t = (i + 0.001) / (NUM_STITCHES * 2);
      if (t > minProg) break;
      const pt = zigzagVertex(i * 2);
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = 'rgba(30,20,10,0.6)';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, cfg.tW * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, cfg.tW * 0.15, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10,5,0,0.8)';
      ctx.fill();
    }
    ctx.restore();
  }

  if (stitchProg >= 1 && alpha > 0) {
    const endPt = getZigzagPoint(1);
    drawSafetyPin(ctx, endPt, alpha);
  }

  } catch (e) { console.error(e); }
  requestAnimationFrame(draw);
}

initZigzag();
startTime = performance.now();
requestAnimationFrame(draw);
</script>
</body>
</html>
