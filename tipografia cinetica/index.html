<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPILLA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #3a3028; overflow: hidden; font-family: Helvetica, Arial, sans-serif; }
canvas { display: block; width: 100%; height: 100%; }
#controls {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  padding: 8px 16px; border-radius: 8px; display: flex; gap: 14px;
  flex-wrap: wrap; justify-content: center; align-items: center;
  font-size: 11px; color: #ccc; z-index: 10; user-select: none;
}
#controls label { display: flex; align-items: center; gap: 4px; }
#controls input[type="range"] { width: 50px; }
#controls input[type="color"] { width: 24px; height: 24px; border: none; padding: 0; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <label>Speed <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1"></label>
  <label>Thread <input type="color" id="threadColor" value="#cc3344"></label>
  <label>Letters <input type="color" id="letterColor" value="#1a1a22"></label>
  <label>Width <input type="range" id="threadWidth" min="0.5" max="6" step="0.1" value="2.5"></label>
  <label>Size <input type="range" id="letterSize" min="10" max="50" step="1" value="22"></label>
  <label>Stagger <input type="range" id="stagger" min="0" max="0.1" step="0.005" value="0.02"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const LETTERS = ['S', 'P', 'I', 'L', 'L', 'A'];

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const inputs = {
  speed: document.getElementById('speed'),
  threadColor: document.getElementById('threadColor'),
  letterColor: document.getElementById('letterColor'),
  threadWidth: document.getElementById('threadWidth'),
  letterSize: document.getElementById('letterSize'),
  stagger: document.getElementById('stagger'),
};

function getCfg() {
  return {
    speed: parseFloat(inputs.speed.value) || 1,
    tCol: inputs.threadColor.value || '#cc3344',
    lCol: inputs.letterColor.value || '#1a1a22',
    tW: parseFloat(inputs.threadWidth.value) || 2.5,
    lSz: parseFloat(inputs.letterSize.value) || 22,
    stg: parseFloat(inputs.stagger.value) || 0.02,
  };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function drawBackground(ctx_, W_, H_) {
  ctx_.fillStyle = '#7a6a56';
  ctx_.fillRect(0, 0, W_, H_);
  ctx_.strokeStyle = 'rgba(100,88,72,0.12)';
  ctx_.lineWidth = 0.6;
  for (let i = 0; i < 40; i++) {
    const y = (i / 40) * H_ + H_ * 0.02;
    ctx_.beginPath();
    ctx_.moveTo(0, y);
    for (let x = 0; x < W_; x += 15) {
      ctx_.lineTo(x, y + Math.sin(x * 0.008 + i * 1.5) * 2);
    }
    ctx_.stroke();
  }
  const bgGrad = ctx_.createRadialGradient(W_*0.4, H_*0.4, 0, W_*0.5, H_*0.5, W_*0.8);
  bgGrad.addColorStop(0, 'rgba(90,78,65,0.15)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0.2)');
  ctx_.fillStyle = bgGrad;
  ctx_.fillRect(0, 0, W_, H_);
}

function drawFabric(ctx_, W_, H_) {
  const cx = W_ / 2;
  const cy = H_ / 2;
  const fw = W_ * 0.75;
  const fh = H_ * 0.72;

  const cloth = new Path2D();
  cloth.rect(cx - fw/2, cy - fh/2, fw, fh);

  ctx_.save();
  ctx_.shadowColor = 'rgba(0,0,0,0.3)';
  ctx_.shadowBlur = 40;
  ctx_.shadowOffsetY = 10;
  ctx_.shadowOffsetX = 4;
  ctx_.fillStyle = 'rgba(0,0,0,0.01)';
  ctx_.fill(cloth);
  ctx_.restore();

  ctx_.save();
  const baseGrad = ctx_.createLinearGradient(cx, cy - fh/2, cx, cy + fh/2);
  baseGrad.addColorStop(0, '#ddd6c4');
  baseGrad.addColorStop(0.5, '#d4ccb8');
  baseGrad.addColorStop(1, '#c8c0ac');
  ctx_.fillStyle = baseGrad;
  ctx_.fill(cloth);
  ctx_.clip(cloth);

  ctx_.save();
  ctx_.beginPath();
  ctx_.rect(cx - fw/2, cy - fh/2, fw/2, fh);
  ctx_.clip();
  const leftGrad = ctx_.createLinearGradient(cx - fw/2, cy, cx, cy);
  leftGrad.addColorStop(0, 'rgba(255,248,235,0.08)');
  leftGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx_.fillStyle = leftGrad;
  ctx_.fillRect(cx - fw/2, cy - fh/2, fw/2, fh);
  ctx_.restore();

  ctx_.save();
  ctx_.beginPath();
  ctx_.rect(cx, cy - fh/2, fw/2, fh);
  ctx_.clip();
  const rightGrad = ctx_.createLinearGradient(cx, cy, cx + fw/2, cy);
  rightGrad.addColorStop(0, 'rgba(0,0,0,0)');
  rightGrad.addColorStop(1, 'rgba(0,0,0,0.20)');
  ctx_.fillStyle = rightGrad;
  ctx_.fillRect(cx, cy - fh/2, fw/2, fh);
  ctx_.restore();

  ctx_.strokeStyle = 'rgba(80,70,55,0.15)';
  ctx_.lineWidth = 1.5;
  ctx_.beginPath();
  ctx_.moveTo(cx, cy - fh/2);
  ctx_.lineTo(cx, cy + fh/2);
  ctx_.stroke();

  const foldShd = ctx_.createLinearGradient(cx - 8, cy, cx + 2, cy);
  foldShd.addColorStop(0, 'rgba(0,0,0,0)');
  foldShd.addColorStop(0.5, 'rgba(0,0,0,0.12)');
  foldShd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx_.fillStyle = foldShd;
  ctx_.fillRect(cx - 8, cy - fh/2, 10, fh);

  const foldHi = ctx_.createLinearGradient(cx, cy, cx + 8, cy);
  foldHi.addColorStop(0, 'rgba(255,255,240,0)');
  foldHi.addColorStop(0.5, 'rgba(255,255,240,0.10)');
  foldHi.addColorStop(1, 'rgba(255,255,240,0)');
  ctx_.fillStyle = foldHi;
  ctx_.fillRect(cx, cy - fh/2, 8, fh);

  ctx_.globalAlpha = 0.06;
  ctx_.strokeStyle = '#a09078';
  ctx_.lineWidth = 0.4;
  for (let y = cy - fh/2; y < cy + fh/2; y += 3) {
    ctx_.beginPath();
    ctx_.moveTo(cx - fw/2, y);
    ctx_.lineTo(cx + fw/2, y);
    ctx_.stroke();
  }
  for (let x = cx - fw/2; x < cx + fw/2; x += 3) {
    ctx_.beginPath();
    ctx_.moveTo(x, cy - fh/2);
    ctx_.lineTo(x, cy + fh/2);
    ctx_.stroke();
  }

  const edgeShd = ctx_.createRadialGradient(cx, cy, fw*0.2, cx, cy, fw*0.55);
  edgeShd.addColorStop(0, 'rgba(0,0,0,0)');
  edgeShd.addColorStop(0.7, 'rgba(0,0,0,0)');
  edgeShd.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx_.globalAlpha = 1;
  ctx_.fillStyle = edgeShd;
  ctx_.fillRect(cx - fw/2, cy - fh/2, fw, fh);

  ctx_.restore();
}

const SPIRAL_TURNS = 6;
const SPIRAL_START_RADIUS = 8;
let spiralEndRadius = Math.min(W, H) * 0.3;

function initSpiral() {
  spiralEndRadius = Math.min(W, H) * 0.3;
}

function getSpiralPoint(t) {
  const angle = t * SPIRAL_TURNS * 2 * Math.PI;
  const r = SPIRAL_START_RADIUS + (spiralEndRadius - SPIRAL_START_RADIUS) * t;
  const cx = W / 2;
  const cy = H / 2;
  return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
}

function getSpiralAngle(t) {
  const angle = t * SPIRAL_TURNS * 2 * Math.PI;
  const drdt = (spiralEndRadius - SPIRAL_START_RADIUS);
  const r = SPIRAL_START_RADIUS + drdt * t;
  const dx = -r * Math.sin(angle) + drdt * Math.cos(angle);
  const dy = r * Math.cos(angle) + drdt * Math.sin(angle);
  return Math.atan2(dy, dx);
}

function drawLetter(ctx_, char, x, y, size, color, angle, alpha, inside) {
  ctx_.save();
  ctx_.translate(x, y);
  ctx_.rotate(angle);
  ctx_.font = `bold ${size}px Helvetica, Arial, sans-serif`;
  ctx_.textAlign = 'center';
  ctx_.textBaseline = 'middle';
  ctx_.globalAlpha = alpha;
  if (inside) {
    ctx_.fillStyle = '#6a5e50';
    ctx_.globalAlpha *= 0.5;
  } else {
    ctx_.fillStyle = color;
    ctx_.shadowColor = 'rgba(0,0,0,0.15)';
    ctx_.shadowBlur = 3;
  }
  ctx_.fillText(char, 0, 0);
  ctx_.restore();
}

function drawStitches(ctx_, prog, color, width, alpha) {
  if (prog <= 0) return;
  ctx_.save();
  const segments = 300;
  const segs = Math.floor(prog * segments);
  for (let i = 0; i < segs; i++) {
    const t1 = i / segments;
    const t2 = (i + 1) / segments;
    const p1 = getSpiralPoint(t1);
    const p2 = getSpiralPoint(t2);
    const mx = (p1.x + p2.x) / 2;
    const isRight = mx > W / 2;
    ctx_.globalAlpha = isRight ? alpha * 0.4 : alpha;
    ctx_.strokeStyle = isRight ? '#886070' : color;
    ctx_.lineWidth = width;
    ctx_.lineCap = 'round';
    ctx_.beginPath();
    ctx_.moveTo(p1.x, p1.y);
    ctx_.lineTo(p2.x, p2.y);
    ctx_.stroke();
  }
  for (let n = 0; n < SPIRAL_TURNS * 2; n++) {
    const t = (0.5 + n) / (SPIRAL_TURNS * 2);
    if (t > prog) break;
    const pt = getSpiralPoint(t);
    ctx_.globalAlpha = alpha * 0.6;
    ctx_.fillStyle = 'rgba(30,20,10,0.5)';
    ctx_.beginPath();
    ctx_.arc(pt.x, pt.y, width * 0.25, 0, Math.PI * 2);
    ctx_.fill();
    ctx_.beginPath();
    ctx_.arc(pt.x, pt.y, width * 0.15, 0, Math.PI * 2);
    ctx_.fillStyle = 'rgba(10,5,0,0.7)';
    ctx_.fill();
  }
  ctx_.restore();
}

function drawSafetyPin(ctx_, pt, angle, alpha) {
  const a = angle + Math.PI * 0.25;
  const len = 14;
  const px = pt.x + Math.cos(a) * len;
  const py = pt.y + Math.sin(a) * len;
  ctx_.save();
  ctx_.globalAlpha = alpha;
  ctx_.shadowColor = 'rgba(0,0,0,0.12)';
  ctx_.shadowBlur = 2;
  ctx_.strokeStyle = '#a0a0a8';
  ctx_.lineWidth = 1.8;
  ctx_.beginPath();
  ctx_.moveTo(pt.x, pt.y);
  ctx_.lineTo(px, py);
  ctx_.stroke();
  ctx_.fillStyle = '#b8b8c0';
  ctx_.beginPath();
  ctx_.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
  ctx_.fill();
  ctx_.fillStyle = '#888890';
  ctx_.beginPath();
  ctx_.arc(px, py, 1, 0, Math.PI * 2);
  ctx_.fill();
  ctx_.restore();
}

let startTime = 0;

function draw(ts) {
  try {
  const cfg = getCfg();
  const spd = cfg.speed;
  const stg = cfg.stg;
  const letterTravelTime = 4.5;
  const travelTime = stg * (LETTERS.length - 1) + letterTravelTime;
  const holdTime = 2.0;
  const fadeTime = 0.8;
  const cycleLen = travelTime + holdTime + fadeTime;
  const t = ((ts - startTime) / 1000) * spd;
  const ct = t % cycleLen;

  let alpha = 1;
  if (ct >= travelTime + holdTime) {
    alpha = 1 - (ct - travelTime - holdTime) / fadeTime;
  }
  alpha = Math.max(0, alpha);

  ctx.clearRect(0, 0, W, H);
  drawBackground(ctx, W, H);
  drawFabric(ctx, W, H);

  let maxProg = 0;
  for (let i = 0; i < LETTERS.length; i++) {
    const raw = (ct - stg * i) / letterTravelTime;
    if (raw > maxProg) maxProg = raw;
  }
  const stitchProg = Math.min(1, maxProg);

  if (stitchProg > 0 && alpha > 0) {
    drawStitches(ctx, stitchProg, cfg.tCol, cfg.tW, alpha);
  }

  if (stitchProg >= 1 && alpha > 0) {
    const endPt = getSpiralPoint(1);
    const a = getSpiralAngle(1);
    drawSafetyPin(ctx, endPt, a, alpha);
  }

  for (let i = 0; i < LETTERS.length; i++) {
    const raw = (ct - stg * i) / letterTravelTime;
    const prog = clamp(raw, 0, 1);
    if (raw < 0) continue;

    let drawX, drawY, drawAngle;
    let inside = false;

    if (raw >= 1) {
      const sinceDone = raw - 1;
      const endPt = getSpiralPoint(1);
      const fx = W / 2 + (i - 2.5) * cfg.lSz * 0.6;
      const fy = H * 0.88;
      if (sinceDone < 0.3) {
        const tr = sinceDone / 0.3;
        const ease = tr * tr * (3 - 2 * tr);
        drawX = lerp(endPt.x, fx, ease);
        drawY = lerp(endPt.y, fy, ease);
      } else {
        drawX = fx;
        drawY = fy;
      }
      drawAngle = 0;
    } else {
      const pt = getSpiralPoint(prog);
      drawX = pt.x;
      drawY = pt.y;
      drawAngle = getSpiralAngle(prog);
      const isRightSide = drawX > W / 2;
      const isOnFold = Math.abs(drawX - W / 2) < 3;
      inside = isRightSide || isOnFold;
    }

    drawLetter(ctx, LETTERS[i], drawX, drawY, cfg.lSz, cfg.lCol, drawAngle, alpha, inside);
  }

  } catch (e) { console.error(e); }
  requestAnimationFrame(draw);
}

initSpiral();
startTime = performance.now();
requestAnimationFrame(draw);
</script>
</body>
</html>
