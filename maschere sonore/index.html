<svg id="canvas" viewBox="0 0 595.28 841.89" preserveAspectRatio="xMidYMid meet">
<defs>
<style>
.st0{fill:none}
.st1{fill:#e7401e}
</style>
</defs>
<g id="active-sfondo"></g>
<g id="active-occhi"></g>
<g id="active-corpo"></g>
<g id="active-body"></g>
</svg>

<div id="controls">
<span id="status">Click to activate audio</span> | <span id="volume">0%</span>
</div>

<script>
var NS = 'http://www.w3.org/2000/svg';
var NUM_PTS = 300;

var eyeData = [];
var morphPoints = [];
var smoothVolume = 0;
var isActive = false;
var audioStarted = false;
var audioCtx, analyser, source, stream;
var animId;

var hiddenSvg = document.querySelector('svg[aria-hidden="true"]');
var fermoTemplate = document.getElementById('fermo-template');
var movTemplate = document.getElementById('movimento-template');

function parsePathParts(d) {
  return d.split(/(-?\d+(?:\.\d+)?|-?\.\d+)/g);
}

function numsFromParts(parts) {
  var nums = [];
  for (var i = 1; i < parts.length; i += 2) {
    nums.push(parseFloat(parts[i]));
  }
  return nums;
}

function interpolateD(parts, numsA, numsB, t) {
  var out = '';
  var idx = 0;
  for (var i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      out += parts[i];
    } else {
      var a = numsA[idx];
      var b = numsB[idx];
      out += (a + t * (b - a)).toFixed(2);
      idx++;
    }
  }
  return out;
}

function samplePoints(d, count) {
  var path = document.createElementNS(NS, 'path');
  path.setAttribute('d', d);
  hiddenSvg.appendChild(path);
  var len = path.getTotalLength();
  var pts = [];
  for (var i = 0; i < count; i++) {
    var frac = (count - 1 === 0) ? 0 : len * i / (count - 1);
    var p = path.getPointAtLength(frac);
    pts.push({ x: p.x, y: p.y });
  }
  hiddenSvg.removeChild(path);
  return pts;
}

function init() {
  document.querySelector('#active-sfondo').appendChild(
    movTemplate.querySelector('g[id="sfondo"] rect').cloneNode(true)
  );

  var movCorpo = movTemplate.querySelector('[id="corpo"]');
  var activeCorpo = document.querySelector('#active-corpo');
  if (movCorpo) {
    for (var c = 0; c < movCorpo.children.length; c++) {
      activeCorpo.appendChild(movCorpo.children[c].cloneNode(true));
    }
  }

  var fermoEyes = fermoTemplate.querySelectorAll('#occhi path');
  var movEyes = movTemplate.querySelectorAll('#occhi path');
  var occhiGroup = document.querySelector('#active-occhi');

  for (var i = 0; i < 2; i++) {
    var fp = parsePathParts(fermoEyes[i].getAttribute('d'));
    var fn = numsFromParts(fp);
    var mp = parsePathParts(movEyes[i].getAttribute('d'));
    var mn = numsFromParts(mp);

    var el = document.createElementNS(NS, 'path');
    el.setAttribute('fill', '#000000');
    occhiGroup.appendChild(el);

    eyeData.push({
      parts: fp,
      fermoNums: fn,
      movimentoNums: mn,
      el: el
    });
  }

  var fermoD = fermoTemplate.querySelector('#tentacoli path').getAttribute('d');
  var movD = movTemplate.querySelector('#penne path').getAttribute('d');
  var fPts = samplePoints(fermoD, NUM_PTS);
  var denseMPts = samplePoints(movD, 1000);

  for (var i = 0; i < fPts.length; i++) {
    var best = 0, minDist = Infinity;
    for (var j = 0; j < denseMPts.length; j++) {
      var dx = denseMPts[j].x - fPts[i].x;
      var dy = denseMPts[j].y - fPts[i].y;
      var d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; best = j; }
    }
    morphPoints.push({ fx: fPts[i].x, fy: fPts[i].y, mx: denseMPts[best].x, my: denseMPts[best].y });
  }

  var poly = document.createElementNS(NS, 'polygon');
  poly.setAttribute('fill', '#000000');
  document.querySelector('#active-body').appendChild(poly);
  morphPoints.el = poly;

  updateEyes(0);
  updateBody(0);
}

function updateEyes(t) {
  for (var i = 0; i < eyeData.length; i++) {
    var d = eyeData[i];
    d.el.setAttribute('d', interpolateD(d.parts, d.fermoNums, d.movimentoNums, t));
  }
}

function updateBody(t) {
  var pts = [];
  for (var i = 0; i < morphPoints.length; i++) {
    var mp = morphPoints[i];
    var x = mp.fx + t * (mp.mx - mp.fx);
    var y = mp.fy + t * (mp.my - mp.fy);
    pts.push(x.toFixed(2) + ',' + y.toFixed(2));
  }
  morphPoints.el.setAttribute('points', pts.join(' '));
}

function getVolume() {
  var bufLen = analyser.frequencyBinCount;
  var data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);
  var sum = 0;
  for (var i = 0; i < bufLen; i++) {
    var v = (data[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / bufLen);
}

function tick() {
  if (isActive) {
    var raw = getVolume();
    smoothVolume = smoothVolume * 0.85 + raw * 0.15;
    var t = Math.min(smoothVolume * 6, 1);
    updateEyes(t);
    updateBody(t);
    document.getElementById('volume').textContent = Math.round(t * 100) + '%';
  }
  animId = requestAnimationFrame(tick);
}

async function startAudio() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    document.getElementById('status').textContent = 'Active';
    isActive = true;
  } catch (e) {
    document.getElementById('status').textContent = 'Microphone access denied';
    audioStarted = false;
    isActive = false;
    updateEyes(0);
    updateBody(0);
  }
}

document.addEventListener('click', async function () {
  if (audioCtx && audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (e) {}
  }
  if (!audioStarted) {
    audioStarted = true;
    await startAudio();
  }
});

init();
animId = requestAnimationFrame(tick);
</script>
